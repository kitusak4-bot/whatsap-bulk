<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#121358">
<title>Sign In — WhatsApp SaaS Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --bg: #f5f6fa;
    --ink: #1a1a2e;
    --muted: #6b7280;
    --line: #e2e5ef;
    --card-bg: #ffffff;
    --input-bg: #fafbff;
    --navy: #121358;
    --navy-hover: #0e0f46;
    --error-bg: #fef2f2;
    --error-text: #dc2626;
    --error-border: #fecaca;
    --bg-dot: transparent;
  }
  body.dark {
    --bg: #0a1118;
    --ink: #e1e8f0;
    --muted: #8899aa;
    --line: #2a3a4a;
    --card-bg: #111d2b;
    --input-bg: #152233;
    --navy: #121358;
    --navy-hover: #0e0f46;
    --error-bg: #2d1b1a;
    --error-text: #e74c3c;
    --error-border: rgba(231,76,60,.2);
    --bg-dot: transparent;
  }
  * { margin:0; padding:0; box-sizing:border-box }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family:'Inter','Segoe UI',system-ui,sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    transition: background .3s, color .3s;
  }
  .login-wrap { width:100%; max-width:420px; padding:24px; animation: fadeUp .5s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
  .brand { text-align:center; margin-bottom:32px }
  .brand .logo {
    width:56px; height:56px;
    background: linear-gradient(135deg, #25d366, #128C7E);
    border-radius:16px;
    display:inline-flex; align-items:center; justify-content:center;
    margin-bottom:14px;
    box-shadow: 0 4px 16px rgba(37,211,102,.25);
  }
  .brand .logo svg { width:30px; height:30px; fill:#fff }
  .brand h1 { font-size:21px; font-weight:800; color:var(--ink); letter-spacing:-.4px }
  .brand p { font-size:13.5px; color:var(--muted); margin-top:5px }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius:16px;
    box-shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.04);
    padding:32px;
    transition: background .3s, border-color .3s, box-shadow .3s;
  }
  .card:hover { box-shadow:0 1px 3px rgba(0,0,0,.06),0 12px 32px rgba(0,0,0,.07); }
  .field { margin-bottom:18px }
  .field label { display:block; font-size:13px; font-weight:600; color:var(--ink); margin-bottom:6px }
  .field input {
    width:100%; padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:15px; font-family:inherit;
    color: var(--ink); background: var(--input-bg);
    outline:none;
    transition: border-color .15s, box-shadow .15s, background .3s, color .3s;
  }
  .field input:focus { border-color:var(--navy); box-shadow:0 0 0 3px rgba(17,24,68,.1) }
  .field input::placeholder { color: var(--muted) }
  .btn {
    width:100%; padding:12px;
    background: linear-gradient(135deg, var(--navy), var(--navy-hover));
    color:#fff; border:none;
    border-radius:10px;
    font-size:15px; font-weight:600;
    cursor:pointer;
    transition: transform .1s, box-shadow .2s;
    font-family:inherit;
    position:relative; overflow:hidden;
  }
  .btn:hover { box-shadow: 0 4px 16px rgba(17,24,68,.2); }
  .btn:active { transform:scale(.98) }
  .btn:disabled { opacity:.5; cursor:not-allowed }
  .btn .ripple-effect { position:absolute; border-radius:50%; background:rgba(255,255,255,.3); transform:scale(0); animation:rippleAnim .45s ease forwards; pointer-events:none; }
  @keyframes rippleAnim { from { transform:scale(0); opacity:.5 } to { transform:scale(4); opacity:0 } }
  .alert { display:none; align-items:center; gap:8px; padding:12px 14px; border-radius:10px; font-size:13px; margin-bottom:18px; background:var(--error-bg); color:var(--error-text); border:1px solid var(--error-border); transition: background .3s, color .3s, border-color .3s; }
  .alert.show { display:flex }
  .alert i { flex-shrink:0 }
  .footnote { text-align:center; margin-top:20px; font-size:12px; color:var(--muted) }
  .dark-toggle {
    position: fixed; top: 20px; right: 20px;
    background: var(--card-bg); border: 1px solid var(--line);
    border-radius: 10px; width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ink); font-size: 18px;
    transition: background .2s, color .2s, border-color .2s;
    z-index: 100;
  }
  .dark-toggle:hover { background: var(--line); }
</style>
</head>
<body>
<button class="dark-toggle" id="darkToggle" title="Toggle dark mode"><i class="fa-solid fa-moon" id="darkIcon"></i></button>
<div class="login-wrap">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </div>
    <h1>WhatsApp SaaS Platform</h1>
    <p>Sign in to your dashboard</p>
  </div>
  <div class="card">
    <div class="alert" id="errorAlert"><i class="fa-solid fa-circle-exclamation"></i><span id="errorMsg">Invalid credentials</span></div>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn" type="submit" id="loginBtn">Sign In</button>
    </form>
    <div class="footnote">Protected dashboard · Authorized access only</div>
  </div>
</div>
<script>
  const $ = id => document.getElementById(id);
  const form = $('loginForm');
  const btn = $('loginBtn');
  const alert = $('errorAlert');

  // dark mode
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const storedDark = localStorage.getItem('wapi_dark');
  if (storedDark === '1' || (storedDark === null && prefersDark)) {
    document.body.classList.add('dark');
    $('darkIcon').className = 'fa-solid fa-sun';
  }
  $('darkToggle').onclick = () => {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    $('darkIcon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    localStorage.setItem('wapi_dark', isDark ? '1' : '0');
  };

  // ripple on button
  btn.addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'ripple-effect';
    ripple.style.left = (e.clientX - rect.left - 10) + 'px';
    ripple.style.top = (e.clientY - rect.top - 10) + 'px';
    ripple.style.width = ripple.style.height = '20px';
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();
    alert.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing in…';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: $('email').value, password: $('password').value })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        $('errorMsg').textContent = err.error || 'Invalid email or password';
        alert.classList.add('show');
        return;
      }
      // Store API key and redirect to dashboard
      const data = await res.json();
      if (data.data && data.data.user) {
        localStorage.setItem('wapi_user', JSON.stringify(data.data.user));
        if (data.data.teams && data.data.teams.length > 0 && data.data.teams[0].keys.length > 0) {
          localStorage.setItem('wapi_key', data.data.apiKey || data.data.teams[0].keys[0].id);
        }
      }
      window.location.href = '/dashboard';
    } catch {
      $('errorMsg').textContent = 'Could not reach the server.';
      alert.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  });
</script>
</body>
</html>
