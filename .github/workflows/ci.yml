name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: node --check src/server.js
      - run: npm test
        env:
          ADMIN_API_KEY: ci-test-admin-key-that-is-long-enough-32chars
          API_KEY_PEPPER: ci-test-pepper-secret-that-is-long-enough-32chars

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: whatsap-bulk:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
